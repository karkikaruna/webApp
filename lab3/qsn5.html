<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Input with Toggle</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .password-container {
        background-color: #fff;
        padding: 25px 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        width: 350px;
    }

    .password-wrapper {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }

    .password-wrapper input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px 0 0 5px;
        outline: none;
    }

    .password-wrapper button {
        padding: 10px 15px;
        border: none;
        border-radius: 0 5px 5px 0;
        background-color: #006494;
        color: white;
        font-size: 14px;
        cursor: pointer;
    }

    .password-wrapper button:hover {
        background-color: #005077;
    }

    .status {
        margin-top: 10px;
        font-weight: bold;
        color: #333;
    }
</style>
</head>
<body>
<div class="password-container">
    <h2>Enter Password</h2>
    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password">
        <button id="toggleBtn">Show</button>
    </div>
    <div class="status" id="statusMessage">Password is hidden</div>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggleBtn');
    const statusMessage = document.getElementById('statusMessage');

    toggleBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.textContent = 'Hide';
            statusMessage.textContent = 'Password is visible';
        } else {
            passwordInput.type = 'password';
            toggleBtn.textContent = 'Show';
            statusMessage.textContent = 'Password is hidden';
        }
    });
</script>
</body>
</html>
