<!-- Create a webpage using HTML only that displays student
information in a tabular format. Use the <table>, <tr>, <th>, and
<td> tags to design the table with appropriate headings and rows.
Include at least three rows of data and use attributes such as

border, cellpadding, and cellspacing to improve table readability.
Ensure the table is properly structured and easy to understand. -->
<!DOCTYPE html>
<html lang="en">
<head>student Information
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student Information</title>
</head>
<body>

    <h2 >Student Information</h2>

    <table border="1" cellpadding="8" cellspacing="0" >
       
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Address</th>
        </tr>

        <tr>
            <td>Max</td>
            <td>05</td>
            <td>Dharan</td>
        </tr>

        <tr>
            <td>Joy</td>
            <td>02</td>
            <td>Itahari</td>
        </tr>

        <tr>
            <td>Steve</td>
            <td>01</td>
            <td>Kathmandu</td>
        </tr>
    </table>

</body>
</html>
