<!-- Design a responsive webpage layout using CSS Flexbox. Create a container with multiple items and apply
 flexbox properties such as flex-direction, justify-content, align-items and flex-wrap. Demonstrate the 
 use of flex-grow, flex-shrink and flex-basis on flex items. Use flexbox to design a navigation bar and a
  card-style layout that adjusts properly on different screen sizes. -->


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Responsive Layout</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

.navbar {
    display: flex;
    flex-direction: row;                
    justify-content: space-between;    
    align-items: center;               
    background: #222;
    color: white;
    padding: 15px 40px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    flex-direction: row;
    gap: 20px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 16px;
}

.nav-links a:hover {
    color: orange;
}

.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 200px;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    color: white;
    font-size: 28px;
    font-weight: bold;
}

.flex-demo {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    flex-wrap: wrap;            
    padding: 40px;
    gap: 20px;
}

.box {
    background: #f8f9fc;
    border: 2px solid #ddd;
    padding: 30px;
    text-align: center;
}

.box1 {
    flex-grow: 1;
    flex-shrink: 1;
    flex-basis: 200px;
    background: #ff7675;
}

.box2 {
    flex-grow: 2; 
    flex-shrink: 1;
    flex-basis: 200px;
    background: #74b9ff;
}

.box3 {
    flex-grow: 1;
    flex-shrink: 2; 
    flex-basis: 200px;
    background: #55efc4;
}

.card-container {
    display: flex;
    flex-wrap: wrap;            
    justify-content: center;
    gap: 25px;
    padding: 40px;
}

.card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1 1 250px;   
    max-width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    padding: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    flex-grow: 1;  
}

.card button {
    padding: 10px;
    border: none;
    background: #4e73df;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.card button:hover {
    background: #2e59d9;
}

@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }

    .nav-links {
        flex-wrap: wrap;
        justify-content: center;
    }

    .hero {
        font-size: 20px;
        text-align: center;
        padding: 20px;
    }
}

</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">KK store</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    Welcome to KK store
</section>

<section class="flex-demo">
    <div class="box box1">Product 1<br></div>
    <div class="box box2">Product 2<br></div>
    <div class="box box3">Product 3<br></div>
</section>

<section class="card-container">
    <div class="card">
        <h3>Product 4</h3>
        <p>Place an order to buy this product.</p>
        <button>Add to cart</button>
    </div>

    <div class="card">
        <h3>Product 5</h3>
        <p>Place an order to buy this product.</p>
        <button>Add to cart</button>
    </div>

    <div class="card">
        <h3>Product 6</h3>
        <p>Place an order to buy this product.</p>
        <button>Add to cart</button>
    </div>

    <div class="card">
        <h3>Product 7</h3>
        <p>Place an order to buy this product.</p>
        <button>Add to cart</button>
    </div>
</section>

</body>
</html>
